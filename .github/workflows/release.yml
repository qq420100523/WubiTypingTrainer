name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Release DMG
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build (Release)
        run: |
          xcodebuild build \
            -project WubiTypingTrainer.xcodeproj \
            -scheme WubiTypingTrainer \
            -configuration Release \
            -derivedDataPath "${{ runner.temp }}/DerivedData" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        shell: bash

      - name: Verify binary exists
        run: |
          if [ ! -f "${{ runner.temp }}/DerivedData/Build/Products/Release/WubiTypingTrainer.app/Contents/MacOS/WubiTypingTrainer" ]; then
            echo "::error::Executable not found - build failed!"
            exit 1
          fi
          echo "✅ App binary exists"

      - name: Create .dmg
        run: |
          brew install create-dmg
          create-dmg \
            --volname "WubiTypingTrainer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "WubiTypingTrainer.app" 175 190 \
            --hide-extension "WubiTypingTrainer.app" \
            --app-drop-link 425 190 \
            "WubiTypingTrainer-${{ github.ref_name }}.dmg" \
            "${{ runner.temp }}/DerivedData/Build/Products/Release/WubiTypingTrainer.app"

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: WubiTypingTrainer-${{ github.ref_name }}
          path: WubiTypingTrainer-${{ github.ref_name }}.dmg
          retention-days: 7

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "WubiTypingTrainer ${{ github.ref_name }}" \
            --notes "See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})" \
            "WubiTypingTrainer-${{ github.ref_name }}.dmg"
