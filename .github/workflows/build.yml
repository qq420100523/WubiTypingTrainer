name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    name: Build
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build (Debug)
        run: |
          xcodebuild build \
            -project WubiTypingTrainer.xcodeproj \
            -scheme WubiTypingTrainer \
            -configuration Debug \
            -derivedDataPath "${{ runner.temp }}/DerivedData" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        shell: bash

      - name: Verify binary exists
        run: |
          if [ ! -f "${{ runner.temp }}/DerivedData/Build/Products/Debug/WubiTypingTrainer.app/Contents/MacOS/WubiTypingTrainer" ]; then
            echo "::error::Executable not found - build failed!"
            exit 1
          fi
          echo "✅ App binary exists"

      - name: Create .dmg
        run: |
          brew install create-dmg
          create-dmg \
            --volname "WubiTypingTrainer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "WubiTypingTrainer.app" 175 190 \
            --hide-extension "WubiTypingTrainer.app" \
            --app-drop-link 425 190 \
            "WubiTypingTrainer-${{ github.sha }}.dmg" \
            "${{ runner.temp }}/DerivedData/Build/Products/Debug/WubiTypingTrainer.app"

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: WubiTypingTrainer-Debug
          path: WubiTypingTrainer-${{ github.sha }}.dmg
          retention-days: 3
